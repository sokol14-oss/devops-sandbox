server {
    listen 80 default_server; 
    server_name asokolova.pro; # Сюда будут заходить люди из интернета
    # Специальный путь для проверки Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект на HTTPS (пока закомментируй, включим после получения сертификата)
    # location / {
    #    return 301 https://$host$request_uri;
    # }

    root /var/www/html/landing;
    index index.php index.html;

location /social {
    alias /var/www/html/social; # Говорим Nginx брать файлы отсюда
    index index.php;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $request_filename; # Важно для alias!
        fastcgi_pass php:9000;
    }
}

    # Подключаем обработку PHP
	location = /admin.php {
    auth_basic "Секретная зона";
    auth_basic_user_file /etc/nginx/.htpasswd;

    include snippets/fastcgi-php.conf;
    fastcgi_pass php:9000; 
}
	

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php:9000;
    }

  location / {
        try_files $uri $uri/ =404;
    }

}
