# Блок 1: Ловим всех на 80 порту и перекидываем на безопасный HTTPS
server {
    listen 80;
    server_name asokolova.pro www.asokolova.pro;

    # Путь для продления сертификатов (не удаляй!)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект
    location / {
        return 301 https://$host$request_uri;
    }
}

# Блок 2: Основная работа сайта на 443 порту (SSL)
server {
    listen 443 ssl;
    server_name asokolova.pro www.asokolova.pro;

    # Пути к сертификатам
    ssl_certificate /etc/letsencrypt/live/asokolova.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asokolova.pro/privkey.pem;

    # Оптимизация безопасности
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/html/landing;
    index index.php index.html;

    location /social {
        alias /var/www/html/social;
        index index.php;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_pass php:9000;
        }
    }

    location = /admin.php {
        auth_basic "Секретная зона";
        auth_basic_user_file /etc/nginx/.htpasswd;
        include snippets/fastcgi-php.conf;
        fastcgi_pass php:9000;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass php:9000;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}